name: Build, Scan, and Deploy

# =============================================================================
# Triggers: push to main (full deploy pipeline) and PRs to main (build+scan only,
# no push/deploy - PRs never mutate production state).
# =============================================================================
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Reusable, environment-agnostic variables available to every job/step
env:
  IMAGE_NAME: devops-assessment-app
  REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
  KUBE_NAMESPACE: app-production
  HELM_RELEASE_NAME: devops-assessment-app-production
  HELM_CHART_PATH: ./helm

# Avoid two deploys racing each other on rapid pushes to main
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write   # required for Trivy SARIF upload to the Security tab

jobs:
  # ---------------------------------------------------------------------
  # 1. Build the Docker image and compute the semantic version tag.
  #    Runs for both push and pull_request events.
  # ---------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.tag }}
      full_image: ${{ steps.version.outputs.full_image }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for tag/describe-based versioning

      - name: Compute semantic version tag
        id: version
        run: |
          set -euo pipefail
          # Use the latest annotated tag as a base; default to v0.1.0 if none exist.
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LAST_TAG" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\1/')
          MINOR=$(echo "$LAST_TAG" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\2/')
          PATCH=$(echo "$LAST_TAG" | sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+).*/\3/')
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          # On pull requests, use a unique pre-release tag so nothing collides with real releases.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            NEW_TAG="${NEW_TAG}-pr${{ github.event.pull_request.number }}.${{ github.run_number }}"
          fi

          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed version tag: ${NEW_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ steps.version.outputs.full_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image as artifact for downstream jobs
        run: docker save ${{ steps.version.outputs.full_image }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ---------------------------------------------------------------------
  # 2. Security scan with Trivy. Runs for both push and pull_request.
  #    Fails the pipeline on HIGH/CRITICAL vulnerabilities.
  # ---------------------------------------------------------------------
  scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Run Trivy vulnerability scanner (readable table, fails the build)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: image.tar
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Generate SARIF report for GitHub Security tab
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          input: image.tar
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ---------------------------------------------------------------------
  # 3. Push to Docker Hub. Only on push to main (never on PRs).
  # ---------------------------------------------------------------------
  push:
    name: Push Image to Docker Hub
    runs-on: ubuntu-latest
    needs: [build, scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push versioned tag
        run: docker push ${{ needs.build.outputs.full_image }}

      - name: Tag and push "latest"
        run: |
          docker tag ${{ needs.build.outputs.full_image }} ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

  # ---------------------------------------------------------------------
  # 4. Deploy via Helm, run smoke tests, roll back automatically on failure.
  #    Only on push to main.
  # ---------------------------------------------------------------------
  deploy:
    name: Deploy with Helm
    runs-on: ubuntu-latest
    needs: [build, push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Record deployment start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.15.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: helm lint
        run: helm lint ${{ env.HELM_CHART_PATH }}

      - name: Validate chart rendering (yaml sanity check)
        run: helm template ${{ env.HELM_RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} > /tmp/rendered.yaml

      - name: Ensure namespace exists (idempotent)
        run: kubectl get namespace ${{ env.KUBE_NAMESPACE }} || kubectl create namespace ${{ env.KUBE_NAMESPACE }}

      - name: Deploy with helm upgrade --install (idempotent)
        id: deploy_step
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Deployment attempt ${attempt}/3"
            if helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
              --namespace ${{ env.KUBE_NAMESPACE }} \
              --create-namespace \
              --set image.repository=${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }} \
              --set image.tag=${{ needs.build.outputs.image_tag }} \
              --set env[1].name=APP_VERSION \
              --set env[1].value=${{ needs.build.outputs.image_tag }} \
              --wait --timeout 120s; then
              echo "Helm deploy succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Attempt ${attempt} failed, retrying in 10s..."
            sleep 10
          done
          echo "All helm upgrade attempts failed"
          exit 1

      - name: Wait for rollout status
        id: rollout_status
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }} \
            --namespace ${{ env.KUBE_NAMESPACE }} --timeout=120s

      - name: Run smoke tests
        id: smoke_test
        run: |
          set -euo pipefail
          kubectl port-forward svc/${{ env.HELM_RELEASE_NAME }} 18080:80 \
            --namespace ${{ env.KUBE_NAMESPACE }} &
          PF_PID=$!
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:18080/health || echo "000")
          kill $PF_PID || true
          echo "Smoke test HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Smoke test FAILED"
            exit 1
          fi
          echo "Smoke test PASSED"

      - name: Automatic rollback on failure
        if: failure() && (steps.deploy_step.outcome == 'failure' || steps.rollout_status.outcome == 'failure' || steps.smoke_test.outcome == 'failure')
        run: |
          echo "A pipeline step failed. Rolling back release ${{ env.HELM_RELEASE_NAME }}..."
          helm rollback ${{ env.HELM_RELEASE_NAME }} 0 \
            --namespace ${{ env.KUBE_NAMESPACE }} --wait --timeout 120s || \
          kubectl rollout undo deployment/${{ env.HELM_RELEASE_NAME }} --namespace ${{ env.KUBE_NAMESPACE }}
          echo "Rollback complete."
          exit 1

      - name: Log deployment duration
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.timer.outputs.start }}
          echo "Deployment duration: $((END - START)) seconds"

      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment Successful :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ needs.build.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Namespace: \`${{ env.KUBE_NAMESPACE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release: \`${{ env.HELM_RELEASE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
